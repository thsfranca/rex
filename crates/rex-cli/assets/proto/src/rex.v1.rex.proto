syntax = "proto3";

package rex.v1;

service RexService {
  rpc GetSystemStatus(GetSystemStatusRequest) returns (GetSystemStatusResponse);
  rpc StreamInference(StreamInferenceRequest) returns (stream StreamInferenceResponse);
  // Sidecar broker: workspace file read (MVP `fs.read`).
  rpc BrokerReadFile(BrokerReadFileRequest) returns (BrokerReadFileResponse);
  // Sidecar broker: workspace directory listing (MVP `fs.list`).
  rpc BrokerListDir(BrokerListDirRequest) returns (BrokerListDirResponse);
  rpc BrokerWriteFile(BrokerWriteFileRequest) returns (BrokerWriteFileResponse);
  rpc BrokerExecShell(BrokerExecShellRequest) returns (BrokerExecShellResponse);
  // Sidecar broker: OpenAI-compatible HTTP inference (daemon executes backend).
  rpc BrokerInference(BrokerInferenceRequest) returns (BrokerInferenceResponse);
}

message GetSystemStatusRequest {}

message GetSystemStatusResponse {
  string daemon_version = 1;
  uint64 uptime_seconds = 2;
  string active_model_id = 3;
}

message StreamInferenceRequest {
  string prompt = 1;
  // Optional. Empty string means "use daemon default" (e.g. mock model id in MVP).
  string model = 2;
  // Optional. Empty string is treated as "ask". Values are normalized server-side.
  string mode = 3;
  // Optional. Set when extension approved agent execution (ADR 0009).
  string approval_id = 4;
}

message BrokerReadFileRequest {
  string path = 1;
}

message BrokerReadFileResponse {
  bool ok = 1;
  string content = 2;
  string error = 3;
}

message BrokerListDirRequest {
  string path = 1;
}

message BrokerListDirResponse {
  bool ok = 1;
  repeated string entries = 2;
  string error = 3;
}

message BrokerWriteFileRequest {
  string path = 1;
  string content = 2;
}

message BrokerWriteFileResponse {
  bool ok = 1;
  string error = 2;
}

message BrokerExecShellRequest {
  string command = 1;
}

message BrokerExecShellResponse {
  bool ok = 1;
  string stdout = 2;
  string stderr = 3;
  string error = 4;
}

message BrokerInferenceRequest {
  string prompt = 1;
  string mode = 2;
  string model = 3;
}

message BrokerInferenceResponse {
  bool ok = 1;
  string text = 2;
  string error = 3;
}

message StreamInferenceResponse {
  string text = 1;
  uint64 index = 2;
  bool done = 3;
}
