syntax = "proto3";

package rex.v1;

service RexService {
  rpc GetSystemStatus(GetSystemStatusRequest) returns (GetSystemStatusResponse);
  rpc StreamInference(StreamInferenceRequest) returns (stream StreamInferenceResponse);
}

message GetSystemStatusRequest {}

message GetSystemStatusResponse {
  string daemon_version = 1;
  uint64 uptime_seconds = 2;
  string active_model_id = 3;
}

message StreamInferenceRequest {
  string prompt = 1;
  // Optional. Empty string means "use daemon default" (e.g. mock model id in MVP).
  string model = 2;
  // Optional. Empty string is treated as "ask". Values are normalized server-side.
  string mode = 3;
}

message StreamInferenceResponse {
  string text = 1;
  uint64 index = 2;
  bool done = 3;
}
