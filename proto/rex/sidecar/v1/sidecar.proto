syntax = "proto3";

package rex.sidecar.v1;

service SidecarService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
  rpc RunTurn(RunTurnRequest) returns (stream RunTurnChunk);
  // Resume a soft-cap paused turn (R063).
  rpc ContinueTurn(ContinueTurnRequest) returns (stream RunTurnChunk);
}

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  string version = 2;
}

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  repeated string capabilities = 1;
}

message RunTurnRequest {
  string prompt = 1;
  string mode = 2;
  // Optional. Empty string means use daemon default model.
  string model = 3;
  // Optional (Phase 1b). Daemon-issued correlation; empty if not yet populated.
  string turn_id = 4;
  // Optional (Phase 1b). Hash of assembled context stages for cache/debug.
  string context_revision = 5;
  // Paths already present in daemon-assembled context (R065).
  repeated string injected_files = 7;
}

message ContinueTurnRequest {
  // Token from soft-cap activity detail (R063).
  string continue_token = 1;
  // Optional correlation from the paused turn.
  string turn_id = 2;
}

message RunTurnChunk {
  string text = 1;
  uint64 index = 2;
  bool done = 3;
  // Optional structured stream event. Empty or "chunk" with text = markdown delta.
  string event = 4;
  string tool_name = 5;
  string phase = 6;
  string summary = 7;
  string detail = 8;
  string tool_call_id = 9;
  string turn_id = 10;
  uint64 sequence = 11;
  uint64 elapsed_ms = 12;
}
