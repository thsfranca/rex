# LiteLLM proxy config for Rex managed gateway ($REX_ROOT/gateway/config.yaml).
# Add cloud providers via gateway/.env (see .env.example).

model_list:
  - model_name: ollama/*
    litellm_params:
      model: ollama/*
      api_base: http://127.0.0.1:11434

litellm_settings:
  check_provider_endpoint: true
