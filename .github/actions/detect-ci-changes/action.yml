name: Detect CI changes
description: Path-aware change detection for Rex CI and CodeQL workflows.
outputs:
  rust_verify_changed:
    description: Rust workspace or source paths changed.
    value: ${{ steps.filter.outputs.rust_verify_changed }}
  extension_verify_changed:
    description: Extension source paths changed.
    value: ${{ steps.filter.outputs.extension_verify_changed }}
  sidecar_changed:
    description: Builtin sidecar paths changed.
    value: ${{ steps.filter.outputs.sidecar_changed }}
  guidelines_changed:
    description: Guideline conformance paths changed.
    value: ${{ steps.filter.outputs.guidelines_changed }}
  rust_codeql_changed:
    description: Rust source paths changed (CodeQL).
    value: ${{ steps.filter.outputs.rust_codeql_changed }}
  extension_codeql_changed:
    description: Extension source paths changed (CodeQL).
    value: ${{ steps.filter.outputs.extension_codeql_changed }}
  python_codeql_changed:
    description: Python sidecar source paths changed (CodeQL).
    value: ${{ steps.filter.outputs.python_codeql_changed }}
  rust_relevant:
    description: Whether rust-verify should run.
    value: ${{ steps.relevance.outputs.rust_relevant }}
  extension_relevant:
    description: Whether extension-verify should run.
    value: ${{ steps.relevance.outputs.extension_relevant }}
  sidecar_relevant:
    description: Whether sidecar-verify should run.
    value: ${{ steps.relevance.outputs.sidecar_relevant }}
  guidelines_relevant:
    description: Whether guidelines-verify should run.
    value: ${{ steps.relevance.outputs.guidelines_relevant }}
  rust_codeql_relevant:
    description: Whether CodeQL rust analysis should run on path-filtered events.
    value: ${{ steps.relevance.outputs.rust_codeql_relevant }}
  extension_codeql_relevant:
    description: Whether CodeQL javascript analysis should run on path-filtered events.
    value: ${{ steps.relevance.outputs.extension_codeql_relevant }}
  python_codeql_relevant:
    description: Whether CodeQL python analysis should run on path-filtered events.
    value: ${{ steps.relevance.outputs.python_codeql_relevant }}
runs:
  using: composite
  steps:
    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          rust_verify_changed:
            - 'crates/**'
            - 'proto/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
          extension_verify_changed:
            - 'extensions/rex-vscode/**'
          sidecar_changed:
            - 'sidecars/**'
            - 'crates/rex-sidecar-stub/**'
            - 'crates/rex-daemon/src/sidecar_*.rs'
            - 'crates/rex-daemon/tests/*sidecar*'
            - 'crates/rex-daemon/tests/agent_scaffold_smoke.rs'
            - 'crates/rex-daemon/tests/mvp_product_path.rs'
            - 'proto/rex/sidecar/**'
            - 'scripts/ci/run_sidecar_verify.sh'
            - 'scripts/ci/run_*sidecar*.sh'
            - 'scripts/ci/run_rex_agent_checks.sh'
            - 'scripts/ci/builtin_sidecars.txt'
          guidelines_changed:
            - 'fixtures/guidelines/**'
            - 'fixtures/ndjson_contract/**'
            - 'docs/ERROR_HANDLING.md'
            - 'docs/EXTENSION.md'
            - 'extensions/rex-vscode/src/shared/messages.ts'
            - 'crates/rex-daemon/src/access_policy.rs'
            - 'scripts/ci/guidelines/**'
            - 'scripts/ci/run_guidelines_verify.sh'
            - 'scripts/ci/test_guidelines_checks.sh'
          rust_codeql_changed:
            - 'crates/**'
            - 'proto/**'
          extension_codeql_changed:
            - 'extensions/rex-vscode/**'
          python_codeql_changed:
            - 'sidecars/**'

    - name: Set relevance outputs
      id: relevance
      shell: bash
      env:
        RUST_VERIFY_CHANGED: ${{ steps.filter.outputs.rust_verify_changed }}
        EXTENSION_VERIFY_CHANGED: ${{ steps.filter.outputs.extension_verify_changed }}
        SIDECAR_CHANGED: ${{ steps.filter.outputs.sidecar_changed }}
        GUIDELINES_CHANGED: ${{ steps.filter.outputs.guidelines_changed }}
        RUST_CODEQL_CHANGED: ${{ steps.filter.outputs.rust_codeql_changed }}
        EXTENSION_CODEQL_CHANGED: ${{ steps.filter.outputs.extension_codeql_changed }}
        PYTHON_CODEQL_CHANGED: ${{ steps.filter.outputs.python_codeql_changed }}
      run: bash "$(cd "${GITHUB_ACTION_PATH}/../../.." && pwd)/scripts/ci/evaluate_ci_relevance.sh"
