version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns: ["*"]
    labels: ["dependencies", "cargo"]
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: pip
    directory: /sidecars/rex-agent
    schedule:
      interval: weekly
      day: wednesday
    open-pull-requests-limit: 3
    groups:
      agent-deps:
        patterns: ["*"]
    cooldown:
      default-days: 5
      semver-major-days: 21
    labels: ["dependencies", "pip"]
    commit-message:
      prefix: chore
      include: scope
