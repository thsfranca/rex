name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "26 3 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust_relevant: ${{ steps.detect.outputs.rust_relevant }}
      extension_relevant: ${{ steps.detect.outputs.extension_relevant }}
      sidecar_relevant: ${{ steps.detect.outputs.sidecar_relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect changed paths
        id: detect
        uses: ./.github/actions/detect-ci-changes

  analyze-rust:
    name: Analyze (rust)
    needs: [changes]
    if: ${{ needs.changes.outputs.rust_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system build dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler mold

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          config-file: .github/codeql/codeql-config.yml

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Analyze
        id: analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:rust

      - name: Write Job Summary
        if: always()
        run: |
          {
            echo "### CodeQL (rust)"
            echo ""
            echo "- result: ${{ steps.analyze.outcome }}"
            echo "- mode: advisory (continue-on-error)"
            echo "- triage: Security → Code scanning alerts"
            echo "- run_id: ${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"

  analyze-javascript:
    name: Analyze (javascript)
    needs: [changes]
    if: ${{ needs.changes.outputs.extension_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: extensions/rex-vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/rex-vscode/package-lock.json

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          config-file: .github/codeql/codeql-config.yml

      - name: Install and build extension
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Analyze
        id: analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript

      - name: Write Job Summary
        if: always()
        run: |
          {
            echo "### CodeQL (javascript)"
            echo ""
            echo "- result: ${{ steps.analyze.outcome }}"
            echo "- mode: advisory (continue-on-error)"
            echo "- triage: Security → Code scanning alerts"
            echo "- run_id: ${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"

  analyze-python:
    name: Analyze (python)
    needs: [changes]
    if: ${{ needs.changes.outputs.sidecar_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          config-file: .github/codeql/codeql-config.yml

      - name: Install rex-agent
        run: |
          python -m pip install --upgrade pip
          pip install -e "sidecars/rex-agent/[dev]"

      - name: Analyze
        id: analyze
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python

      - name: Write Job Summary
        if: always()
        run: |
          {
            echo "### CodeQL (python)"
            echo ""
            echo "- result: ${{ steps.analyze.outcome }}"
            echo "- mode: advisory (continue-on-error)"
            echo "- triage: Security → Code scanning alerts"
            echo "- run_id: ${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"
