name: release-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build-macos:
    if: ${{ vars.REX_DESKTOP_RELEASE_ENABLED == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/rex-web/package-lock.json
            apps/rex-desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf
        run: brew install protobuf

      - name: Build web UI
        run: npm ci && npm run build
        working-directory: apps/rex-web

      - name: Install Electron shell
        run: npm ci
        working-directory: apps/rex-desktop

      - name: Build CLI
        run: cargo build -p rex --locked

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: rex-desktop-macos
          path: |
            apps/rex-desktop
            apps/rex-web/dist
            target/debug/rex
          retention-days: 7
