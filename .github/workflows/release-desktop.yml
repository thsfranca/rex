name: release-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build-macos:
    if: ${{ vars.REX_DESKTOP_RELEASE_ENABLED == 'true' }}
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/rex-web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf
        run: brew install protobuf

      - name: Build web UI
        run: npm ci && npm run build
        working-directory: apps/rex-web

      - name: Build desktop bundle
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Desktop release signing requires repository secrets and REX_DESKTOP_RELEASE_ENABLED=true."
          cargo build -p rex-desktop --locked

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: rex-desktop-macos
          path: target/debug/rex-desktop
