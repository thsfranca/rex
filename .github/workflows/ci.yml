name: ci

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust_verify_changed: ${{ steps.detect.outputs.rust_verify_changed }}
      sidecar_changed: ${{ steps.detect.outputs.sidecar_changed }}
      guidelines_changed: ${{ steps.detect.outputs.guidelines_changed }}
      rust_relevant: ${{ steps.detect.outputs.rust_relevant }}
      sidecar_relevant: ${{ steps.detect.outputs.sidecar_relevant }}
      guidelines_relevant: ${{ steps.detect.outputs.guidelines_relevant }}
      ui_relevant: ${{ steps.detect.outputs.ui_relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect changed paths
        id: detect
        uses: ./.github/actions/detect-ci-changes

  rust-verify:
    needs: [changes]
    if: ${{ needs.changes.outputs.rust_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
      CARGO_TERM_PROGRESS_WHEN: never
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system build dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler mold

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Rust verify
        id: run_rust_verify
        continue-on-error: true
        run: ./scripts/ci/run_rust_verify.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh rust-verify

      - name: Upload diagnostics artifact
        if: ${{ steps.run_rust_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-rust-verify-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce rust verify job status
        if: ${{ steps.run_rust_verify.outcome != 'success' }}
        run: ./scripts/ci/enforce_verify_job.sh

  sidecar-verify:
    needs: [changes]
    if: ${{ needs.changes.outputs.sidecar_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system build dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run sidecar verify
        id: run_sidecar_verify
        continue-on-error: true
        run: ./scripts/ci/run_sidecar_verify.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh sidecar-verify

      - name: Upload diagnostics artifact
        if: ${{ steps.run_sidecar_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-sidecar-verify-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce sidecar verify job status
        if: ${{ steps.run_sidecar_verify.outcome != 'success' }}
        run: ./scripts/ci/enforce_verify_job.sh

  guidelines-verify:
    needs: [changes]
    if: ${{ needs.changes.outputs.guidelines_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run guidelines verify
        id: run_guidelines_verify
        continue-on-error: true
        run: ./scripts/ci/run_guidelines_verify.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh guidelines-verify

      - name: Upload diagnostics artifact
        if: ${{ steps.run_guidelines_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-guidelines-verify-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce guidelines verify status
        if: ${{ steps.run_guidelines_verify.outcome != 'success' }}
        run: ./scripts/ci/enforce_verify_job.sh

  ui-build:
    needs: [changes]
    if: ${{ needs.changes.outputs.ui_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build UI artifacts
        id: run_ui_build
        continue-on-error: true
        run: ./scripts/ci/build_ui_artifacts.sh

      - name: Upload UI build artifacts
        if: ${{ steps.run_ui_build.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ui-build-artifacts-${{ github.run_id }}
          path: |
            apps/rex-web/dist
            crates/rex-ui-harness/dist
          retention-days: 1

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh ui-build

      - name: Upload diagnostics artifact
        if: ${{ steps.run_ui_build.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-ui-build-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce ui build job status
        if: ${{ steps.run_ui_build.outcome != 'success' }}
        run: ./scripts/ci/enforce_verify_job.sh

  ui-verify:
    needs: [changes, ui-build]
    if: |
      always() &&
      needs.changes.outputs.ui_relevant == 'true' &&
      (needs.ui-build.result == 'success' || needs.ui-build.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: build
            runner: ubuntu-latest
          - mode: desktop
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download UI build artifacts
        if: ${{ needs.ui-build.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: ui-build-artifacts-${{ github.run_id }}
          path: .

      - name: Install system build dependencies
        if: ${{ matrix.mode == 'desktop' }}
        run: brew install protobuf

      - name: Setup Rust
        if: ${{ matrix.mode == 'desktop' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        if: ${{ matrix.mode == 'desktop' }}
        uses: Swatinem/rust-cache@v2

      - name: Run UI verify
        id: run_ui_verify
        continue-on-error: true
        env:
          REX_ROOT: ${{ github.workspace }}/fixtures/ui_probe/rex_root
          REX_SIDECAR_HARNESS: direct
        run: |
          ARGS=(--mode "${{ matrix.mode }}" --skip-harness-build)
          if [ "${{ matrix.mode }}" = "desktop" ]; then
            ARGS+=(--skip-web-build)
          fi
          ./scripts/ci/run_ui_verify.sh "${ARGS[@]}"

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh ui-verify-${{ matrix.mode }}

      - name: Upload diagnostics artifact
        if: ${{ steps.run_ui_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-ui-verify-${{ matrix.mode }}-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce ui verify job status
        if: ${{ steps.run_ui_verify.outcome != 'success' }}
        run: ./scripts/ci/enforce_verify_job.sh

  ci-checks:
    if: ${{ always() }}
    needs: [changes, rust-verify, sidecar-verify, guidelines-verify, ui-build, ui-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts/ci
          sparse-checkout-cone-mode: false

      - name: Run Gate
        id: run_gate
        continue-on-error: true
        env:
          RUST_RELEVANT: ${{ needs.changes.outputs.rust_relevant }}
          SIDECAR_RELEVANT: ${{ needs.changes.outputs.sidecar_relevant }}
          GUIDELINES_RELEVANT: ${{ needs.changes.outputs.guidelines_relevant }}
          UI_RELEVANT: ${{ needs.changes.outputs.ui_relevant }}
          RUST_RESULT: ${{ needs.rust-verify.result }}
          SIDECAR_RESULT: ${{ needs.sidecar-verify.result }}
          GUIDELINES_RESULT: ${{ needs.guidelines-verify.result }}
          UI_RESULT: ${{ needs.ui-verify.result }}
        run: ./scripts/ci/enforce_ci_gate.sh

      - name: Upload diagnostics artifact
        if: ${{ steps.run_gate.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-ci-checks-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce ci checks status
        if: ${{ steps.run_gate.outcome != 'success' }}
        run: exit 1
