name: ci

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust_changed: ${{ steps.detect.outputs.rust_changed }}
      extension_changed: ${{ steps.detect.outputs.extension_changed }}
      ci_changed: ${{ steps.detect.outputs.ci_changed }}
      global_changed: ${{ steps.detect.outputs.global_changed }}
      sidecar_changed: ${{ steps.detect.outputs.sidecar_changed }}
      guidelines_changed: ${{ steps.detect.outputs.guidelines_changed }}
      rust_relevant: ${{ steps.detect.outputs.rust_relevant }}
      extension_relevant: ${{ steps.detect.outputs.extension_relevant }}
      sidecar_relevant: ${{ steps.detect.outputs.sidecar_relevant }}
      guidelines_relevant: ${{ steps.detect.outputs.guidelines_relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect changed paths
        id: detect
        uses: ./.github/actions/detect-ci-changes

  rust-verify:
    needs: [changes]
    if: ${{ needs.changes.outputs.rust_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
      CARGO_TERM_PROGRESS_WHEN: never
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system build dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler mold

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Rust verify
        id: run_rust_verify
        continue-on-error: true
        run: ./scripts/ci/run_rust_verify.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh rust-verify

      - name: Upload diagnostics artifact
        if: ${{ steps.run_rust_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-rust-verify-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce rust verify job status
        if: ${{ steps.run_rust_verify.outcome != 'success' }}
        run: exit 1

  sidecar-verify:
    needs: [changes]
    if: ${{ needs.changes.outputs.sidecar_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system build dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run sidecar verify
        id: run_sidecar_verify
        continue-on-error: true
        run: ./scripts/ci/run_sidecar_verify.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh sidecar-verify

      - name: Upload diagnostics artifact
        if: ${{ steps.run_sidecar_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-sidecar-verify-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce sidecar verify job status
        if: ${{ steps.run_sidecar_verify.outcome != 'success' }}
        run: exit 1

  extension-verify:
    needs: [changes]
    if: ${{ needs.changes.outputs.extension_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extensions/rex-vscode/package-lock.json

      - name: Run extension verify
        id: run_extension_verify
        continue-on-error: true
        run: ./scripts/ci/run_extension_verify.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh extension-verify

      - name: Upload diagnostics artifact
        if: ${{ steps.run_extension_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-extension-verify-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Upload VSIX artifact
        if: ${{ steps.run_extension_verify.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: rex-vscode-vsix-${{ github.run_id }}
          path: extensions/rex-vscode/rex-vscode.vsix
          retention-days: 7
          if-no-files-found: warn

      - name: Enforce extension verify job status
        if: ${{ steps.run_extension_verify.outcome != 'success' }}
        run: exit 1

  guidelines-verify:
    needs: [changes]
    if: ${{ needs.changes.outputs.guidelines_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run guidelines verify
        id: run_guidelines_verify
        continue-on-error: true
        run: ./scripts/ci/run_guidelines_verify.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh guidelines-verify

      - name: Upload diagnostics artifact
        if: ${{ steps.run_guidelines_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-guidelines-verify-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce guidelines verify status
        if: ${{ steps.run_guidelines_verify.outcome != 'success' }}
        run: exit 1

  ci-checks:
    if: ${{ always() }}
    needs: [changes, rust-verify, sidecar-verify, extension-verify, guidelines-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts/ci
          sparse-checkout-cone-mode: false

      - name: Run Gate
        id: run_gate
        continue-on-error: true
        env:
          RUST_RELEVANT: ${{ needs.changes.outputs.rust_relevant }}
          EXTENSION_RELEVANT: ${{ needs.changes.outputs.extension_relevant }}
          SIDECAR_RELEVANT: ${{ needs.changes.outputs.sidecar_relevant }}
          GUIDELINES_RELEVANT: ${{ needs.changes.outputs.guidelines_relevant }}
          RUST_RESULT: ${{ needs.rust-verify.result }}
          SIDECAR_RESULT: ${{ needs.sidecar-verify.result }}
          EXTENSION_RESULT: ${{ needs.extension-verify.result }}
          GUIDELINES_RESULT: ${{ needs.guidelines-verify.result }}
        run: ./scripts/ci/enforce_ci_gate.sh

      - name: Upload diagnostics artifact
        if: ${{ steps.run_gate.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-ci-checks-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce ci checks status
        if: ${{ steps.run_gate.outcome != 'success' }}
        run: exit 1
