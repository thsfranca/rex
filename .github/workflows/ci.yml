name: ci

on:
  pull_request:
  merge_group:
    types: [checks_requested]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt-clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install CLI Binaries
        run: ./scripts/install-cli.sh

      - name: Run Fmt and Clippy
        id: run_checks
        continue-on-error: true
        run: ./scripts/ci/run_rust_fmt_clippy.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh rust-fmt-clippy

      - name: Upload diagnostics artifact
        if: ${{ steps.run_checks.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-rust-fmt-clippy-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce fmt/clippy job status
        if: ${{ steps.run_checks.outcome != 'success' }}
        run: exit 1

  rust-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install CLI Binaries
        run: ./scripts/install-cli.sh

      - name: Run Tests
        id: run_tests
        continue-on-error: true
        run: ./scripts/ci/run_rust_tests.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh rust-test

      - name: Upload diagnostics artifact
        if: ${{ steps.run_tests.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-report-rust-test-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce test job status
        if: ${{ steps.run_tests.outcome != 'success' }}
        run: exit 1

  rust-checks:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [rust-fmt-clippy, rust-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gate
        id: run_gate
        continue-on-error: true
        env:
          FMT_RESULT: ${{ needs.rust-fmt-clippy.result }}
          TEST_RESULT: ${{ needs.rust-test.result }}
        run: ./scripts/ci/enforce_rust_gate.sh

      - name: Upload diagnostics artifact
        if: ${{ steps.run_gate.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-rust-checks-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce gate job status
        if: ${{ steps.run_gate.outcome != 'success' }}
        run: exit 1
