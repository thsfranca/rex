name: ci

on:
  pull_request:
  merge_group:
    types: [checks_requested]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt-clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install CLI binaries via project script
        run: ./scripts/install-cli.sh

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Lint check
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install CLI binaries via project script
        run: ./scripts/install-cli.sh

      - name: Test (all targets)
        run: cargo test --workspace --all-targets --locked

  rust-checks:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [rust-fmt-clippy, rust-test]
    steps:
      - name: Ensure all required jobs passed
        run: |
          if [ "${{ needs.rust-fmt-clippy.result }}" != "success" ] || [ "${{ needs.rust-test.result }}" != "success" ]; then
            echo "At least one required check failed."
            exit 1
          fi
