name: ci

on:
  pull_request:
  merge_group:
    types: [checks_requested]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt-clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install CLI binaries via project script
        run: ./scripts/install-cli.sh

      - name: Run fmt and clippy with observability signals
        id: run_checks
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p ci-observability
          result="success"
          fail_code="-"
          fail_stage="-"
          hint="-"

          echo "::group::Setup"
          echo "::notice::CI stage Setup complete; dependencies and toolchain are ready."
          echo "::endgroup::"

          echo "::group::BuildAndChecks"
          if ! cargo fmt --all -- --check 2>&1 | tee "ci-observability/fmt.log"; then
            result="failure"
            fail_code="FMT_FAIL"
            fail_stage="BuildAndChecks"
            hint="Run cargo fmt locally."
            echo "::error::Formatting check failed."
            echo "CI_SIGNAL code=${fail_code} stage=${fail_stage} result=${result} hint=${hint}"
          elif ! cargo clippy --workspace --all-targets --locked -- -D warnings 2>&1 | tee "ci-observability/clippy.log"; then
            result="failure"
            fail_code="CLIPPY_FAIL"
            fail_stage="BuildAndChecks"
            hint="Fix clippy warnings locally."
            echo "::error::Lint check failed."
            echo "CI_SIGNAL code=${fail_code} stage=${fail_stage} result=${result} hint=${hint}"
          fi
          echo "::endgroup::"

          echo "::group::TestExecution"
          echo "::notice::No test execution in this job."
          echo "::endgroup::"

          echo "CI_RESULT=${result}" >> "$GITHUB_ENV"
          echo "CI_FAIL_CODE=${fail_code}" >> "$GITHUB_ENV"
          echo "CI_FAIL_STAGE=${fail_stage}" >> "$GITHUB_ENV"
          echo "CI_HINT=${hint}" >> "$GITHUB_ENV"

          if [ "${result}" != "success" ]; then
            exit 1
          fi

      - name: Post run summary
        if: ${{ always() }}
        run: |
          echo "::group::PostRunSummary"
          {
            echo "### rust-fmt-clippy"
            echo ""
            echo "- result: ${CI_RESULT}"
            echo "- fail_stage: ${CI_FAIL_STAGE}"
            echo "- fail_code: ${CI_FAIL_CODE}"
            echo "- hint: ${CI_HINT}"
            echo "- run_id: ${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::Summary written for rust-fmt-clippy."
          echo "::endgroup::"

      - name: Upload diagnostics artifact
        if: ${{ steps.run_checks.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-rust-fmt-clippy-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce fmt/clippy job status
        if: ${{ steps.run_checks.outcome != 'success' }}
        run: exit 1

  rust-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install CLI binaries via project script
        run: ./scripts/install-cli.sh

      - name: Run tests with observability signals
        id: run_tests
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p ci-observability
          result="success"
          fail_code="-"
          fail_stage="-"
          hint="-"

          echo "::group::Setup"
          echo "::notice::CI stage Setup complete; dependencies and toolchain are ready."
          echo "::endgroup::"

          echo "::group::BuildAndChecks"
          echo "::notice::No build-only checks in this job."
          echo "::endgroup::"

          echo "::group::TestExecution"
          if ! cargo test --workspace --all-targets --locked 2>&1 | tee "ci-observability/test.log"; then
            result="failure"
            fail_code="TEST_FAIL"
            fail_stage="TestExecution"
            hint="Run cargo test locally."
            echo "::error::Test execution failed."
            echo "CI_SIGNAL code=${fail_code} stage=${fail_stage} result=${result} hint=${hint}"
          fi
          echo "::endgroup::"

          echo "CI_RESULT=${result}" >> "$GITHUB_ENV"
          echo "CI_FAIL_CODE=${fail_code}" >> "$GITHUB_ENV"
          echo "CI_FAIL_STAGE=${fail_stage}" >> "$GITHUB_ENV"
          echo "CI_HINT=${hint}" >> "$GITHUB_ENV"

          if [ "${result}" != "success" ]; then
            exit 1
          fi

      - name: Post run summary
        if: ${{ always() }}
        run: |
          echo "::group::PostRunSummary"
          {
            echo "### rust-test"
            echo ""
            echo "- result: ${CI_RESULT}"
            echo "- fail_stage: ${CI_FAIL_STAGE}"
            echo "- fail_code: ${CI_FAIL_CODE}"
            echo "- hint: ${CI_HINT}"
            echo "- run_id: ${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::Summary written for rust-test."
          echo "::endgroup::"

      - name: Upload diagnostics artifact
        if: ${{ steps.run_tests.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-report-rust-test-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce test job status
        if: ${{ steps.run_tests.outcome != 'success' }}
        run: exit 1

  rust-checks:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [rust-fmt-clippy, rust-test]
    steps:
      - name: Ensure all required jobs passed
        run: |
          fmt_result="${{ needs.rust-fmt-clippy.result }}"
          test_result="${{ needs.rust-test.result }}"
          echo "::group::Setup"
          echo "::notice::Evaluating upstream required checks."
          echo "::endgroup::"

          echo "::group::BuildAndChecks"
          echo "::notice::No build/check execution in gate job."
          echo "::endgroup::"

          echo "::group::TestExecution"
          echo "::notice::No test execution in gate job."
          echo "::endgroup::"

          echo "::group::PostRunSummary"
          {
            echo "### rust-checks"
            echo ""
            echo "- rust-fmt-clippy: ${fmt_result}"
            echo "- rust-test: ${test_result}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${fmt_result}" != "success" ] || [ "${test_result}" != "success" ]; then
            echo "::error::At least one required check failed."
            echo "CI_SIGNAL code=GATE_FAIL stage=PostRunSummary result=failure hint=Inspect upstream job summaries and artifacts."
            exit 1
          fi
          echo "::notice::All required checks passed."
          echo "::endgroup::"
