name: ci

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      rust_changed: ${{ steps.filter.outputs.rust_changed }}
      extension_changed: ${{ steps.filter.outputs.extension_changed }}
      ci_changed: ${{ steps.filter.outputs.ci_changed }}
      global_changed: ${{ steps.filter.outputs.global_changed }}
      rust_relevant: ${{ steps.set_outputs.outputs.rust_relevant }}
      extension_relevant: ${{ steps.set_outputs.outputs.extension_relevant }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust_changed:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'scripts/install-cli.sh'
              - 'scripts/ci/run_rust_*.sh'
              - 'scripts/ci/enforce_rust_gate.sh'
            extension_changed:
              - 'extensions/rex-vscode/**'
              - 'scripts/ci/run_extension*.sh'
              - 'scripts/ci/enforce_extension_gate.sh'
            ci_changed:
              - '.github/workflows/**'
              - 'scripts/ci/**'
            global_changed:
              - 'Cargo.toml'
              - 'Cargo.lock'

      - name: Set relevance outputs
        id: set_outputs
        env:
          RUST_CHANGED: ${{ steps.filter.outputs.rust_changed }}
          EXT_CHANGED: ${{ steps.filter.outputs.extension_changed }}
          CI_CHANGED: ${{ steps.filter.outputs.ci_changed }}
          GLOBAL_CHANGED: ${{ steps.filter.outputs.global_changed }}
        run: |
          rust_relevant=false
          extension_relevant=false
          if [ "${RUST_CHANGED}" = "true" ] || [ "${CI_CHANGED}" = "true" ] || [ "${GLOBAL_CHANGED}" = "true" ]; then
            rust_relevant=true
          fi
          if [ "${EXT_CHANGED}" = "true" ] || [ "${CI_CHANGED}" = "true" ] || [ "${GLOBAL_CHANGED}" = "true" ]; then
            extension_relevant=true
          fi
          echo "rust_relevant=${rust_relevant}" >> "$GITHUB_OUTPUT"
          echo "extension_relevant=${extension_relevant}" >> "$GITHUB_OUTPUT"

  rust-verify:
    needs: [changes]
    if: ${{ needs.changes.outputs.rust_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
      CARGO_TERM_PROGRESS_WHEN: never
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system build dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler mold

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Rust verify
        id: run_rust_verify
        continue-on-error: true
        run: ./scripts/ci/run_rust_verify.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh rust-verify

      - name: Upload diagnostics artifact
        if: ${{ steps.run_rust_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-rust-verify-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce rust verify job status
        if: ${{ steps.run_rust_verify.outcome != 'success' }}
        run: exit 1

  rust-checks:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, rust-verify]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts/ci
          sparse-checkout-cone-mode: false

      - name: Run Gate
        id: run_gate
        continue-on-error: true
        env:
          RUST_RELEVANT: ${{ needs.changes.outputs.rust_relevant }}
          RUST_VERIFY_RESULT: ${{ needs.rust-verify.result }}
        run: ./scripts/ci/enforce_rust_gate.sh

      - name: Upload diagnostics artifact
        if: ${{ steps.run_gate.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-rust-checks-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce gate job status
        if: ${{ steps.run_gate.outcome != 'success' }}
        run: exit 1

  extension-verify:
    needs: [changes]
    if: ${{ needs.changes.outputs.extension_relevant == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extensions/rex-vscode/package-lock.json

      - name: Run extension verify
        id: run_extension_verify
        continue-on-error: true
        run: ./scripts/ci/run_extension_verify.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh extension-verify

      - name: Upload diagnostics artifact
        if: ${{ steps.run_extension_verify.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-extension-verify-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Upload VSIX artifact
        if: ${{ steps.run_extension_verify.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: rex-vscode-vsix-${{ github.run_id }}
          path: extensions/rex-vscode/rex-vscode.vsix
          retention-days: 7
          if-no-files-found: warn

      - name: Enforce extension verify job status
        if: ${{ steps.run_extension_verify.outcome != 'success' }}
        run: exit 1

  extension-checks:
    if: ${{ always() }}
    needs: [changes, extension-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts/ci
          sparse-checkout-cone-mode: false

      - name: Run Gate
        id: run_gate
        continue-on-error: true
        env:
          EXTENSION_RELEVANT: ${{ needs.changes.outputs.extension_relevant }}
          EXTENSION_VERIFY_RESULT: ${{ needs.extension-verify.result }}
        run: ./scripts/ci/enforce_extension_gate.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh extension-checks

      - name: Upload diagnostics artifact
        if: ${{ steps.run_gate.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-extension-checks-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce extension checks status
        if: ${{ steps.run_gate.outcome != 'success' }}
        run: exit 1

  ci-checks:
    if: ${{ always() }}
    needs: [rust-checks, extension-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts/ci
          sparse-checkout-cone-mode: false

      - name: Run Gate
        id: run_gate
        continue-on-error: true
        env:
          RUST_RESULT: ${{ needs.rust-checks.result }}
          EXTENSION_RESULT: ${{ needs.extension-checks.result }}
        run: ./scripts/ci/enforce_ci_gate.sh

      - name: Write Job Summary
        if: ${{ always() }}
        run: ./scripts/ci/write_job_summary.sh ci-checks

      - name: Upload diagnostics artifact
        if: ${{ steps.run_gate.outcome != 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs-ci-checks-${{ github.run_id }}
          path: ci-observability
          retention-days: 7

      - name: Enforce ci checks status
        if: ${{ steps.run_gate.outcome != 'success' }}
        run: exit 1
