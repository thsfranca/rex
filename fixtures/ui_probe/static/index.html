<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rex UI Probe</title>
    <link rel="stylesheet" href="tokens.css" />
  </head>
  <body data-scenario="idle">
    <canvas id="ambient" width="800" height="600"></canvas>
    <div class="shell" data-testid="shell">
      <header class="header" data-testid="header">
        <span class="status-dot" id="status-dot" data-testid="status-dot"></span>
        <span id="status-label">Ready</span>
      </header>
      <main class="transcript" data-testid="transcript">
        <p id="transcript-content">How do I add retry logic to the daemon client?</p>
      </main>
      <aside class="timeline" data-testid="timeline">
        <p>No tasks</p>
      </aside>
      <div class="composer" data-testid="composer">
        <textarea id="composer-input" rows="2" placeholder="Message Rex…"></textarea>
      </div>
      <footer class="footer" data-testid="footer">Ready · ⌘K ?</footer>
    </div>
    <div class="modal-backdrop" id="modal-backdrop" data-testid="modal-backdrop">
      <div class="modal" data-testid="modal">
        <p>Approval required</p>
        <button id="modal-close" type="button">Dismiss</button>
      </div>
    </div>
    <script>
      const scenarios = {
        idle: () => {
          document.body.dataset.scenario = "idle";
          document.getElementById("status-label").textContent = "Ready";
          document.getElementById("status-dot").className = "status-dot";
        },
        streaming: () => {
          document.body.dataset.scenario = "streaming";
          document.getElementById("status-label").textContent = "Working";
          document.getElementById("status-dot").className = "status-dot working";
          document.getElementById("transcript-content").textContent +=
            " Streaming tokens appear here…";
        },
        approval_required: () => {
          document.getElementById("modal-backdrop").classList.add("open");
        },
        error: () => {
          document.body.dataset.scenario = "error";
          document.getElementById("status-label").textContent = "Error";
          document.getElementById("status-dot").style.backgroundColor =
            "var(--rex-status-error)";
        },
      };

      window.__rexProbe = {
        gotoScenario(name) {
          Object.values(scenarios).forEach((fn) => fn);
          document.getElementById("modal-backdrop").classList.remove("open");
          if (scenarios[name]) scenarios[name]();
          return name;
        },
      };

      document.getElementById("modal-close")?.addEventListener("click", () => {
        document.getElementById("modal-backdrop").classList.remove("open");
      });

      (function ambientCanvas() {
        const canvas = document.getElementById("ambient");
        const ctx = canvas.getContext("2d");
        let t = 0;
        function draw() {
          if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
          t += 0.02;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "rgba(37, 99, 235, 0.3)";
          ctx.beginPath();
          ctx.arc(
            400 + Math.sin(t) * 100,
            300 + Math.cos(t * 0.7) * 80,
            40,
            0,
            Math.PI * 2
          );
          ctx.fill();
          requestAnimationFrame(draw);
        }
        draw();
      })();
    </script>
  </body>
</html>
