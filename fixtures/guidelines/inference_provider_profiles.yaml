# Inference provider profiles — optional operator cheat sheet (NOT a Rex broker API)
#
# Rex has one inference wire: OpenAI Chat Completions via http_openai_compat.
# Operators set inference.openai_compat.base_url directly, or enable a managed
# child (inference.omlx.* or inference.gateway.*) that injects that URL.
#
# This file lists common external-server defaults for documentation only.
# No Rust consumer until a future optional DX slice — not part of oMLX PR 2–3.
# Keep in sync with docs/OMLX_INFERENCE.md and docs/ADAPTERS.md.
#
# Schema version: 1

schema_version: 1

profiles:
  omlx:
    description: oMLX on Apple Silicon — typical loopback URL when managed or external
    base_url_default: "http://127.0.0.1:8000/v1"
    native_tools_default: true
    native_tools_probe: none
    tool_name_encoding: openai
    managed_config_block: inference.omlx
    reference_hub: docs/OMLX_INFERENCE.md

  ollama:
    description: Ollama local OpenAI-compat server
    base_url_default: "http://127.0.0.1:11434/v1"
    native_tools_default: auto
    native_tools_probe: ollama_api_show
    tool_name_encoding: openai
    managed_config_block: null
    reference_hub: docs/NATIVE_TOOL_CALLING.md

  litellm_gateway:
    description: LiteLLM multi-provider gateway (cloud + optional Ollama discovery)
    base_url_default: "http://127.0.0.1:4000/v1"
    native_tools_default: auto
    native_tools_probe: none
    tool_name_encoding: openai
    managed_config_block: inference.gateway
    reference_hub: docs/INFERENCE_GATEWAY.md

  custom:
    description: Operator-supplied base_url; no preset probes
    base_url_default: null
    native_tools_default: auto
    native_tools_probe: none
    tool_name_encoding: openai
    managed_config_block: null
    reference_hub: docs/ADAPTERS.md

# Probe identifiers (optional future DX — not broker contract):
#   ollama_api_show — POST {root}/api/show, capabilities contains "tools"
#   none — rely on native_tools_default or operator override

# tool_name_encoding values (optional future DX):
#   openai — pass tool names as declared in sidecar schemas
#   underscore — encode dots as underscores on wire (some providers)
